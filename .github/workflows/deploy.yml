name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by actions/deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, and don't cancel an in-progress run
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build atom-docs
        run: npm run build:docs

      - name: Build portal
        env:
          # Optional. Without these the deployed portal renders a friendly
          # "Setup needed" screen. The anon key is safe to expose in client
          # bundles — Supabase RLS enforces row ownership.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build:portal

      - name: Assemble combined Pages site
        run: |
          mkdir -p dist
          cp -R apps/atom-docs/dist/. dist/
          mkdir -p dist/portal
          cp -R apps/portal/dist/. dist/portal/
          # SPA fallback: GitHub Pages serves 404.html for unknown paths.
          # Copying index.html keeps React Router deep links working.
          cp dist/index.html dist/404.html
          cp dist/portal/index.html dist/portal/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
